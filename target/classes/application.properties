# Menggunakan variabel lingkungan agar aman (isi di panel hosting nanti)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/defaultdb?allowPublicKeyRetrieval=true&useSSL=true&requireSSL=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Biar port-nya dinamis (beberapa cloud butuh ini)
server.port=${PORT:8080}